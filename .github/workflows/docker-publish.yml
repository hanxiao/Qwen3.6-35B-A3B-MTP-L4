name: Publish optimized image

# Builds the decode-optimized llama.cpp server image and pushes it to GHCR,
# linked to this repo's packages (via the org.opencontainers.image.source label).
on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qwen3.6-35b-a3b-mtp-l4
          tags: |
            type=raw,value=latest
            type=raw,value=l4-q4kxl-mtp
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
